# ──────────────────────────────────────────────────────────
# MawaridX — Nginx reverse proxy (multi-tenant)
# - Single dynamic server block via `map`
# - WebSocket support, gzip, large uploads, security headers
# - SSL via Let's Encrypt (uncomment after running certbot)
# ──────────────────────────────────────────────────────────

events {
  worker_connections 2048;
  multi_accept       on;
}

http {
  # ── Logging ──
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" host=$host upstream=$upstream_addr';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ──
  sendfile          on;
  tcp_nopush        on;
  tcp_nodelay       on;
  keepalive_timeout 65;
  server_tokens     off;

  # ── Body size (file uploads up to 50MB: docs, photos, etc.) ──
  client_max_body_size 50M;
  client_body_timeout  60s;
  client_header_timeout 60s;

  # ── Gzip compression ──
  gzip                on;
  gzip_vary           on;
  gzip_proxied        any;
  gzip_comp_level     6;
  gzip_min_length     256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/woff
    font/woff2;

  # ── WebSocket upgrade map ──
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── Tenant routing map: subdomain → upstream container ──
  # Single-tenant for now. Add new tenants here when scaling
  # (e.g. company-b.mawaridx.com  "hr-company-b:3000";).
  map $host $tenant_upstream {
    default                    "hr-company-a:3000";
    company-a.mawaridx.com     "hr-company-a:3000";
  }

  # ── Common proxy headers (reused via include) ──
  # (Nginx doesn't have a clean way to share these; we repeat in server blocks)

  # ─────────────────────────────────────────────
  # HTTP (port 80) — redirects to HTTPS + ACME challenge
  # ─────────────────────────────────────────────
  server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # While SSL is not yet configured, serve traffic directly.
    # AFTER running certbot, comment the proxy block below and
    # uncomment the redirect to force HTTPS.
    #
    # return 301 https://$host$request_uri;

    location / {
      proxy_pass         http://$tenant_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Forwarded-Host  $host;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_read_timeout 90s;
      proxy_send_timeout 90s;
    }
  }

  # ─────────────────────────────────────────────
  # HTTPS (port 443) — uncomment after obtaining SSL certs
  # ─────────────────────────────────────────────
  # server {
  #   listen      443 ssl http2;
  #   listen      [::]:443 ssl http2;
  #   server_name *.mawaridx.com mawaridx.com;
  #
  #   # Wildcard cert (recommended for multi-tenant)
  #   ssl_certificate     /etc/nginx/ssl/live/mawaridx.com/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/live/mawaridx.com/privkey.pem;
  #
  #   # Modern TLS only
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  #   ssl_prefer_server_ciphers off;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #
  #   # Security headers (HSTS, etc. — most are also set by Next.js middleware)
  #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  #
  #   location / {
  #     proxy_pass         http://$tenant_upstream;
  #     proxy_http_version 1.1;
  #     proxy_set_header   Host              $host;
  #     proxy_set_header   X-Real-IP         $remote_addr;
  #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  #     proxy_set_header   X-Forwarded-Proto $scheme;
  #     proxy_set_header   X-Forwarded-Host  $host;
  #     proxy_set_header   Upgrade           $http_upgrade;
  #     proxy_set_header   Connection        $connection_upgrade;
  #     proxy_read_timeout 90s;
  #     proxy_send_timeout 90s;
  #   }
  # }
}
