events { worker_connections 1024; }

http {
  # ── شركة A: company-a.yourapp.com ──
  server {
    listen 80;
    server_name company-a.yourapp.com;
    location / {
      proxy_pass http://hr-company-a:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── شركة B: company-b.yourapp.com ──
  server {
    listen 80;
    server_name company-b.yourapp.com;
    location / {
      proxy_pass http://hr-company-b:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── شركة C: company-c.yourapp.com ──
  server {
    listen 80;
    server_name company-c.yourapp.com;
    location / {
      proxy_pass http://hr-company-c:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
