# ──────────────────────────────────────────────────────────
# MawaridX — Production multi-tenant compose for Hostinger VPS
# All three app services share the SAME Dockerfile + build cache.
# Docker builds once; layers are reused for B and C instantly.
# 1 nginx reverse proxy on 80/443 (only host-exposed service)
# All apps on internal network, no host port exposure
# ──────────────────────────────────────────────────────────

x-app-env: &app-env
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  DATABASE_URL: "file:./prisma/hr.db"
  JWT_SECRET: ${JWT_SECRET}
  SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS}
  BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_EMAIL: ${VAPID_EMAIL}

x-build: &build
  build:
    context: .
    dockerfile: Dockerfile

x-healthcheck: &healthcheck
  test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 45s

services:

  # ────────── Tenant 1 ──────────
  hr-company-a:
    <<: *build
    container_name: mawaridx-company-a
    restart: unless-stopped
    networks:
      - mawaridx-internal
    environment:
      <<: *app-env
      COMPANY_NAME: ${COMPANY_A_NAME:-Company A}
      NEXT_PUBLIC_APP_URL: ${COMPANY_A_URL}
    volumes:
      - company-a-db:/app/prisma
      - company-a-uploads:/app/public/uploads
      - company-a-backups:/app/backups
    healthcheck: *healthcheck

  # ────────── Tenant 2 ──────────
  hr-company-b:
    <<: *build
    container_name: mawaridx-company-b
    restart: unless-stopped
    networks:
      - mawaridx-internal
    depends_on:
      hr-company-a:
        condition: service_healthy
    environment:
      <<: *app-env
      COMPANY_NAME: ${COMPANY_B_NAME:-Company B}
      NEXT_PUBLIC_APP_URL: ${COMPANY_B_URL}
    volumes:
      - company-b-db:/app/prisma
      - company-b-uploads:/app/public/uploads
      - company-b-backups:/app/backups
    healthcheck: *healthcheck

  # ────────── Tenant 3 ──────────
  hr-company-c:
    <<: *build
    container_name: mawaridx-company-c
    restart: unless-stopped
    networks:
      - mawaridx-internal
    depends_on:
      hr-company-a:
        condition: service_healthy
    environment:
      <<: *app-env
      COMPANY_NAME: ${COMPANY_C_NAME:-Company C}
      NEXT_PUBLIC_APP_URL: ${COMPANY_C_URL}
    volumes:
      - company-c-db:/app/prisma
      - company-c-uploads:/app/public/uploads
      - company-c-backups:/app/backups
    healthcheck: *healthcheck

  # ────────── Reverse Proxy (only host-exposed service) ──────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mawaridx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - mawaridx-internal
    depends_on:
      hr-company-a:
        condition: service_healthy
      hr-company-b:
        condition: service_healthy
      hr-company-c:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  mawaridx-internal:
    driver: bridge

volumes:
  company-a-db:
  company-a-uploads:
  company-a-backups:
  company-b-db:
  company-b-uploads:
  company-b-backups:
  company-c-db:
  company-c-uploads:
  company-c-backups:
  certbot-www:
