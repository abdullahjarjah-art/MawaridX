version: "3.8"

# ══════════════════════════════════════════════════
# تشغيل عدة شركات على نفس الخادم
# الاستخدام: docker-compose -f docker-compose.multi.yml up -d
# ══════════════════════════════════════════════════

services:

  # ── شركة 1 ──
  hr-company-a:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - ./data/company-a:/app/prisma
    environment:
      - COMPANY_NAME=شركة النور
      - DATABASE_PATH=/app/prisma/hr.db
    restart: unless-stopped

  # ── شركة 2 ──
  hr-company-b:
    build: .
    ports:
      - "3002:3000"
    volumes:
      - ./data/company-b:/app/prisma
    environment:
      - COMPANY_NAME=مجموعة الأفق
      - DATABASE_PATH=/app/prisma/hr.db
    restart: unless-stopped

  # ── شركة 3 ──
  hr-company-c:
    build: .
    ports:
      - "3003:3000"
    volumes:
      - ./data/company-c:/app/prisma
    environment:
      - COMPANY_NAME=شركة التقدم
      - DATABASE_PATH=/app/prisma/hr.db
    restart: unless-stopped

  # ── Nginx: توجيه حسب الدومين ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - hr-company-a
      - hr-company-b
      - hr-company-c
    restart: unless-stopped
