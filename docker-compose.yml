# ──────────────────────────────────────────────────────────
# MawaridX — Production multi-tenant compose for Hostinger VPS
# Only hr-company-a builds the image. Tenants B and C reuse the
# same `mawaridx-app:latest` tag — building three identical images
# in parallel would OOM the KVM 2 (8 GB) VPS.
# 1 nginx reverse proxy on 80/443 (only host-exposed service)
# All apps on internal network, no host port exposure
# ──────────────────────────────────────────────────────────

x-app-env: &app-env
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  DATABASE_URL: "file:./prisma/hr.db"
  JWT_SECRET: ${JWT_SECRET}
  SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS}
  BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_EMAIL: ${VAPID_EMAIL}

x-healthcheck: &healthcheck
  test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 45s

services:

  # ────────── Tenant 1 — the ONLY service that builds the image ──────────
  hr-company-a:
    image: mawaridx-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mawaridx-company-a
    restart: unless-stopped
    networks:
      - mawaridx-internal
    environment:
      <<: *app-env
      TENANT_ID: company-a
      COMPANY_NAME: ${COMPANY_A_NAME:-Company A}
      COMPANY_PLAN: ${COMPANY_A_PLAN:-trial}
      NEXT_PUBLIC_APP_URL: ${COMPANY_A_URL}
    volumes:
      - company-a-db:/app/prisma
      - company-a-uploads:/app/public/uploads
      - company-a-backups:/app/backups
    healthcheck: *healthcheck

  # ────────── Tenant 2 — reuses the image built by tenant A ──────────
  hr-company-b:
    image: mawaridx-app:latest
    container_name: mawaridx-company-b
    restart: unless-stopped
    networks:
      - mawaridx-internal
    depends_on:
      - hr-company-a
    environment:
      <<: *app-env
      TENANT_ID: company-b
      COMPANY_NAME: ${COMPANY_B_NAME:-Company B}
      COMPANY_PLAN: ${COMPANY_B_PLAN:-trial}
      NEXT_PUBLIC_APP_URL: ${COMPANY_B_URL}
    volumes:
      - company-b-db:/app/prisma
      - company-b-uploads:/app/public/uploads
      - company-b-backups:/app/backups
    healthcheck: *healthcheck

  # ────────── Tenant 3 — reuses the image built by tenant A ──────────
  hr-company-c:
    image: mawaridx-app:latest
    container_name: mawaridx-company-c
    restart: unless-stopped
    networks:
      - mawaridx-internal
    depends_on:
      - hr-company-a
    environment:
      <<: *app-env
      TENANT_ID: company-c
      COMPANY_NAME: ${COMPANY_C_NAME:-Company C}
      COMPANY_PLAN: ${COMPANY_C_PLAN:-trial}
      NEXT_PUBLIC_APP_URL: ${COMPANY_C_URL}
    volumes:
      - company-c-db:/app/prisma
      - company-c-uploads:/app/public/uploads
      - company-c-backups:/app/backups
    healthcheck: *healthcheck

  # ────────── Reverse Proxy (only host-exposed service) ──────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mawaridx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - mawaridx-internal
    depends_on:
      - hr-company-a
      - hr-company-b
      - hr-company-c
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  mawaridx-internal:
    driver: bridge

volumes:
  company-a-db:
  company-a-uploads:
  company-a-backups:
  company-b-db:
  company-b-uploads:
  company-b-backups:
  company-c-db:
  company-c-uploads:
  company-c-backups:
  certbot-www:
