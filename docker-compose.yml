# ──────────────────────────────────────────────────────────
# MawaridX — Production single-tenant compose for Hostinger VPS
# Currently runs ONE tenant (hr-company-a) + nginx reverse proxy.
# To add another tenant later: copy the hr-company-a service block,
# rename to hr-company-b, REMOVE the `build:` section (use the
# already-built `mawaridx-app:latest` image), add `depends_on:
# [hr-company-a]`, add company-b-* volumes below, then add the
# subdomain → upstream mapping in nginx.conf.
# Building multiple images in parallel OOMs the KVM 2 (8 GB) VPS.
# ──────────────────────────────────────────────────────────

x-app-env: &app-env
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  DATABASE_URL: "file:./prisma/hr.db"
  JWT_SECRET: ${JWT_SECRET}
  SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS}
  BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_EMAIL: ${VAPID_EMAIL}

x-healthcheck: &healthcheck
  test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 45s

services:

  # ────────── Tenant 1 — builds the shared image ──────────
  hr-company-a:
    image: mawaridx-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mawaridx-company-a
    restart: unless-stopped
    networks:
      - mawaridx-internal
    environment:
      <<: *app-env
      TENANT_ID: company-a
      COMPANY_NAME: ${COMPANY_A_NAME:-Company A}
      COMPANY_PLAN: ${COMPANY_A_PLAN:-trial}
      NEXT_PUBLIC_APP_URL: ${COMPANY_A_URL}
    volumes:
      - company-a-db:/app/prisma
      - company-a-uploads:/app/public/uploads
      - company-a-backups:/app/backups
    healthcheck: *healthcheck

  # ────────── Reverse Proxy (only host-exposed service) ──────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mawaridx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - mawaridx-internal
    depends_on:
      - hr-company-a
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  mawaridx-internal:
    driver: bridge

volumes:
  company-a-db:
  company-a-uploads:
  company-a-backups:
  certbot-www:
